services:
  gateway:
    build:
      target: deps
    command: >
      sh -c "pnpm install --shamefully-hoist &&
      pnpm --filter @locallink/shared build &&
      pnpm --filter @locallink/validators build &&
      pnpm --filter @locallink/gateway prisma:generate &&
      pnpm -C services/gateway exec prisma migrate deploy &&
      pnpm --filter @locallink/gateway dev"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/services/gateway/node_modules
      - /app/packages/shared/node_modules
      - /app/packages/validators/node_modules
    working_dir: /app

  postgres:

  web:
    build:
      target: deps
    command: >
      sh -c "pnpm install --shamefully-hoist &&
      pnpm --filter @locallink/shared build &&
      pnpm --filter @locallink/validators build &&
      pnpm --filter @locallink/web dev"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/apps/web/node_modules
      - /app/packages/shared/node_modules
      - /app/packages/validators/node_modules
    working_dir: /app
    environment:
      GATEWAY_URL: http://gateway:3003
      NEXT_PUBLIC_GATEWAY_URL: ${NEXT_PUBLIC_GATEWAY_URL:-http://localhost:3003}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3003}
