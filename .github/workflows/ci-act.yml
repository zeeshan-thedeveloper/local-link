# Consolidated CI for local runs via act (no cache split across jobs).
# GitHub: workflow_dispatch only — does not run on push/PR.
# Local:  act workflow_dispatch -W .github/workflows/ci-act.yml

name: CI (local act)

on:
  workflow_dispatch:

env:
  NODE_VERSION: "22"
  PNPM_VERSION: "9.15.4"

jobs:
  check:
    name: Lint, test, typecheck, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test:coverage
      - run: pnpm build
