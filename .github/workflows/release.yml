name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - run: pnpm install --frozen-lockfile
      - run: pnpm build

      - name: Version packages (changesets)
        uses: changesets/action@v1
        with:
          commit: "chore: version packages"
          title: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HUSKY: "0"

      - name: Publish @locallink/cli with NPM_TOKEN
        id: npm_token_publish
        continue-on-error: true
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          VERSION=$(node -p "require('./apps/host/package.json').version")
          if npm view "@locallink/cli@${VERSION}" version >/dev/null 2>&1; then
            echo "Already published @locallink/cli@${VERSION}"
            exit 0
          fi
          npm whoami
          echo "Publishing @locallink/cli@${VERSION} with NPM_TOKEN..."
          pnpm --filter @locallink/cli publish --access public --no-git-checks

      - name: Publish @locallink/cli via OIDC
        if: steps.npm_token_publish.outcome != 'success'
        run: |
          VERSION=$(node -p "require('./apps/host/package.json').version")
          if npm view "@locallink/cli@${VERSION}" version >/dev/null 2>&1; then
            echo "Already published @locallink/cli@${VERSION}"
            exit 0
          fi
          echo "Publishing @locallink/cli@${VERSION} via OIDC trusted publishing..."
          npmrc="${NPM_CONFIG_USERCONFIG:-$HOME/.npmrc}"
          if [ -f "$npmrc" ]; then
            sed -i '/_authToken/d' "$npmrc" || true
          fi
          unset NODE_AUTH_TOKEN
          pnpm --filter @locallink/cli publish --access public --no-git-checks

      - name: npm publish requires credentials
        if: steps.npm_token_publish.outcome != 'success'
        run: |
          VERSION=$(node -p "require('./apps/host/package.json').version")
          if npm view "@locallink/cli@${VERSION}" version >/dev/null 2>&1; then
            exit 0
          fi
          echo "::error::@locallink/cli@${VERSION} was not published. NPM_TOKEN is expired (401) and npm trusted publishing is not configured. Regenerate an npm automation token at https://www.npmjs.com/settings/~tokens and update the NPM_TOKEN GitHub secret, OR add trusted publishing for workflow release.yml on https://www.npmjs.com/package/@locallink/cli?activeTab=settings"
          exit 1
