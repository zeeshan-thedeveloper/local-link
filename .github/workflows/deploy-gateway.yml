name: Deploy Gateway

on:
  push:
    branches: [main]
    paths:
      - "services/gateway/**"
      - "packages/**"
      - "docker-compose.gateway.prod.yml"
      - "scripts/deploy-gateway-remote.sh"
      - ".github/workflows/deploy-gateway.yml"
  pull_request:
    branches: [main]
    paths:
      - "services/gateway/**"
      - "packages/**"
      - "docker-compose.gateway.prod.yml"
      - "scripts/deploy-gateway-remote.sh"
      - ".github/workflows/deploy-gateway.yml"
  workflow_dispatch:

jobs:
  build:
    name: Build and push image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image-tag: ghcr.io/${{ github.repository_owner }}/locallink-gateway:${{ github.sha }}
    steps:
      - uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: services/gateway/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/locallink-gateway:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/locallink-gateway:latest
          cache-from: type=gha,scope=gateway
          cache-to: type=gha,mode=max,scope=gateway

  deploy-production:
    name: Deploy to Production
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    environment: production
    steps:
      - uses: actions/checkout@v7

      - name: Resolve deploy SSH credentials
        id: ssh
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DROPLET_IP: ${{ secrets.DROPLET_IP }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          HOST="${DEPLOY_HOST:-$DROPLET_IP}"
          USER="${DEPLOY_USER:-zeesh}"
          if [ -n "$DEPLOY_KEY" ] || [ -n "$SSH_PRIVATE_KEY" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
          fi
          echo "host=$HOST" >> "$GITHUB_OUTPUT"
          echo "user=$USER" >> "$GITHUB_OUTPUT"
          if [ -n "$DEPLOY_KEY" ]; then
            echo "use_deploy_key=true" >> "$GITHUB_OUTPUT"
          else
            echo "use_deploy_key=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip production deploy when SSH secrets are missing
        if: steps.ssh.outputs.ready != 'true' || steps.ssh.outputs.host == ''
        run: |
          echo "Skipping production deploy — set DROPLET_IP (or DEPLOY_HOST) and SSH_PRIVATE_KEY (or DEPLOY_KEY)."

      - name: Copy deploy files to droplet
        if: steps.ssh.outputs.ready == 'true' && steps.ssh.outputs.host != ''
        uses: appleboy/scp-action@v1
        with:
          host: ${{ steps.ssh.outputs.host }}
          username: ${{ steps.ssh.outputs.user }}
          key: ${{ steps.ssh.outputs.use_deploy_key == 'true' && secrets.DEPLOY_KEY || secrets.SSH_PRIVATE_KEY }}
          source: "docker-compose.gateway.prod.yml,scripts/deploy-gateway-remote.sh"
          target: "~/apps/locallink"
          strip_components: 0

      - name: Deploy production gateway on droplet
        if: steps.ssh.outputs.ready == 'true' && steps.ssh.outputs.host != ''
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ steps.ssh.outputs.host }}
          username: ${{ steps.ssh.outputs.user }}
          key: ${{ steps.ssh.outputs.use_deploy_key == 'true' && secrets.DEPLOY_KEY || secrets.SSH_PRIVATE_KEY }}
          script: |
            chmod +x ~/apps/locallink/scripts/deploy-gateway-remote.sh
            GATEWAY_IMAGE=ghcr.io/${{ github.repository_owner }}/locallink-gateway:${{ github.sha }} \
              ~/apps/locallink/scripts/deploy-gateway-remote.sh
