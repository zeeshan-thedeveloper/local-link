name: Deploy Gateway

on:
  push:
    branches: [main]
    paths:
      - "services/gateway/**"
      - "packages/**"
  pull_request:
    branches: [main]
    paths:
      - "services/gateway/**"
      - "packages/**"

jobs:
  build:
    name: Build and push image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image-tag: ghcr.io/${{ github.repository_owner }}/locallink-gateway:${{ github.sha }}
      short-sha: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: services/gateway/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/locallink-gateway:${{ github.sha }}
          cache-from: type=gha,scope=gateway
          cache-to: type=gha,mode=max,scope=gateway

  deploy-staging:
    name: Deploy to Staging
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    environment: staging
    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
    steps:
      - name: Skip staging deploy when SSH secrets are missing
        if: env.DEPLOY_HOST == '' || env.DEPLOY_USER == '' || env.DEPLOY_KEY == ''
        run: |
          echo "Skipping staging deploy because one or more required secrets are missing."
          echo "Required GitHub Actions secrets: DEPLOY_HOST, DEPLOY_USER, DEPLOY_KEY."

      - name: Deploy staging container via SSH
        if: env.DEPLOY_HOST != '' && env.DEPLOY_USER != '' && env.DEPLOY_KEY != ''
        uses: appleboy/ssh-action@v1
        with:
          # Required GitHub Actions secrets: DEPLOY_HOST, DEPLOY_USER, DEPLOY_KEY.
          host: ${{ env.DEPLOY_HOST }}
          username: ${{ env.DEPLOY_USER }}
          key: ${{ env.DEPLOY_KEY }}
          script: |
            docker pull ghcr.io/${{ github.repository_owner }}/locallink-gateway:${{ github.sha }}

            docker run --rm \
              --env-file ~/apps/locallink/.env.staging \
              ghcr.io/${{ github.repository_owner }}/locallink-gateway:${{ github.sha }} \
              pnpm --filter @locallink/gateway prisma migrate deploy

            docker stop locallink-gateway-staging 2>/dev/null || true
            docker rm locallink-gateway-staging 2>/dev/null || true
            docker run -d \
              --name locallink-gateway-staging \
              --restart unless-stopped \
              --env-file ~/apps/locallink/.env.staging \
              -p 3004:3003 \
              ghcr.io/${{ github.repository_owner }}/locallink-gateway:${{ github.sha }}

            for i in $(seq 1 12); do
              if curl -sf http://localhost:3004/health; then
                echo "Staging is healthy"
                exit 0
              fi
              echo "Waiting for staging... attempt $i/12"
              sleep 5
            done
            echo "Staging health check failed"
            exit 1

  deploy-production:
    name: Deploy to Production
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production
    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
    steps:
      - name: Skip production deploy when SSH secrets are missing
        if: env.DEPLOY_HOST == '' || env.DEPLOY_USER == '' || env.DEPLOY_KEY == ''
        run: |
          echo "Skipping production deploy because one or more required secrets are missing."
          echo "Required GitHub Actions secrets: DEPLOY_HOST, DEPLOY_USER, DEPLOY_KEY."

      - name: Deploy production container via SSH
        if: env.DEPLOY_HOST != '' && env.DEPLOY_USER != '' && env.DEPLOY_KEY != ''
        uses: appleboy/ssh-action@v1
        with:
          # Required GitHub Actions secrets: DEPLOY_HOST, DEPLOY_USER, DEPLOY_KEY.
          host: ${{ env.DEPLOY_HOST }}
          username: ${{ env.DEPLOY_USER }}
          key: ${{ env.DEPLOY_KEY }}
          script: |
            PREV_IMAGE=$(docker inspect --format='{{.Image}}' locallink-gateway 2>/dev/null || echo "")

            docker pull ghcr.io/${{ github.repository_owner }}/locallink-gateway:${{ github.sha }}

            docker run --rm \
              --env-file ~/apps/locallink/.env \
              ghcr.io/${{ github.repository_owner }}/locallink-gateway:${{ github.sha }} \
              pnpm --filter @locallink/gateway prisma migrate deploy

            cd ~/apps/locallink
            GATEWAY_IMAGE=ghcr.io/${{ github.repository_owner }}/locallink-gateway:${{ github.sha }} \
              docker compose up -d --no-deps gateway

            for i in $(seq 1 12); do
              if curl -sf http://localhost:3003/health; then
                echo "Production deploy successful"
                exit 0
              fi
              echo "Waiting... attempt $i/12"
              sleep 5
            done

            echo "Health check failed, rolling back to $PREV_IMAGE"
            if [ -n "$PREV_IMAGE" ]; then
              docker stop locallink-gateway
              docker rm locallink-gateway
              docker run -d \
                --name locallink-gateway \
                --restart unless-stopped \
                --env-file ~/apps/locallink/.env \
                -p 3003:3003 \
                "$PREV_IMAGE"
            fi
            exit 1
