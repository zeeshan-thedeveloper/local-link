name: Deploy Gateway

on:
  push:
    branches: [main]
    paths:
      - "services/gateway/**"
      - "packages/**"
      - "docker-compose.gateway.prod.yml"
      - "scripts/deploy-gateway-remote.sh"
      - ".github/workflows/deploy-gateway.yml"
  pull_request:
    branches: [main]
    paths:
      - "services/gateway/**"
      - "packages/**"
      - "docker-compose.gateway.prod.yml"
      - "scripts/deploy-gateway-remote.sh"
      - ".github/workflows/deploy-gateway.yml"
  workflow_dispatch:

jobs:
  build:
    name: Build and push image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image-tag: ghcr.io/${{ github.repository_owner }}/locallink-gateway:${{ github.sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: services/gateway/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/locallink-gateway:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/locallink-gateway:latest
          cache-from: type=gha,scope=gateway
          cache-to: type=gha,mode=max,scope=gateway

  deploy-staging:
    name: Deploy to Staging
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    environment: staging
    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Skip staging deploy when SSH secrets are missing
        if: env.DEPLOY_HOST == '' || env.DEPLOY_USER == '' || env.DEPLOY_KEY == ''
        run: |
          echo "Skipping staging deploy because one or more required secrets are missing."
          echo "Required GitHub Actions secrets: DEPLOY_HOST, DEPLOY_USER, DEPLOY_KEY."

      - name: Copy deploy files to droplet
        if: env.DEPLOY_HOST != '' && env.DEPLOY_USER != '' && env.DEPLOY_KEY != ''
        uses: appleboy/scp-action@v1
        with:
          host: ${{ env.DEPLOY_HOST }}
          username: ${{ env.DEPLOY_USER }}
          key: ${{ env.DEPLOY_KEY }}
          source: "docker-compose.gateway.prod.yml,scripts/deploy-gateway-remote.sh"
          target: "~/apps/locallink"
          strip_components: 0

      - name: Deploy staging container via SSH
        if: env.DEPLOY_HOST != '' && env.DEPLOY_USER != '' && env.DEPLOY_KEY != ''
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ env.DEPLOY_HOST }}
          username: ${{ env.DEPLOY_USER }}
          key: ${{ env.DEPLOY_KEY }}
          script: |
            chmod +x ~/apps/locallink/scripts/deploy-gateway-remote.sh
            APP_DIR=~/apps/locallink \
            ENV_FILE=~/apps/locallink/.env.staging \
            COMPOSE_FILE=~/apps/locallink/docker-compose.gateway.prod.yml \
            COMPOSE_PROJECT_NAME=locallink-staging \
            GATEWAY_PORT=3004 \
            GATEWAY_IMAGE=ghcr.io/${{ github.repository_owner }}/locallink-gateway:${{ github.sha }} \
              ~/apps/locallink/scripts/deploy-gateway-remote.sh

  deploy-production:
    name: Deploy to Production
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    environment: production
    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Skip production deploy when SSH secrets are missing
        if: env.DEPLOY_HOST == '' || env.DEPLOY_USER == '' || env.DEPLOY_KEY == ''
        run: |
          echo "Skipping production deploy because one or more required secrets are missing."
          echo "Required GitHub Actions secrets: DEPLOY_HOST, DEPLOY_USER, DEPLOY_KEY."

      - name: Copy deploy files to droplet
        if: env.DEPLOY_HOST != '' && env.DEPLOY_USER != '' && env.DEPLOY_KEY != ''
        uses: appleboy/scp-action@v1
        with:
          host: ${{ env.DEPLOY_HOST }}
          username: ${{ env.DEPLOY_USER }}
          key: ${{ env.DEPLOY_KEY }}
          source: "docker-compose.gateway.prod.yml,scripts/deploy-gateway-remote.sh"
          target: "~/apps/locallink"
          strip_components: 0

      - name: Deploy production gateway on droplet
        if: env.DEPLOY_HOST != '' && env.DEPLOY_USER != '' && env.DEPLOY_KEY != ''
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ env.DEPLOY_HOST }}
          username: ${{ env.DEPLOY_USER }}
          key: ${{ env.DEPLOY_KEY }}
          script: |
            chmod +x ~/apps/locallink/scripts/deploy-gateway-remote.sh
            GATEWAY_IMAGE=ghcr.io/${{ github.repository_owner }}/locallink-gateway:${{ github.sha }} \
              ~/apps/locallink/scripts/deploy-gateway-remote.sh
